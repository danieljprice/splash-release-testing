name: release
# a general github action to generate a release whenever a version tag is pushed
# generates and uploads a tarball of the source code
# in a way that plays nicely with git submodules
# could be easily adapted to produce binaries for each OS
# Daniel Price, Aug 2020
on:
  push:
    tags:
    - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            suffix: linux-x86_64
          - os: macos-latest
            suffix: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - uses: fortran-lang/setup-fortran@v1
      with:
        compiler: gcc
        version: 'latest'

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libcairo2-dev libhdf5-dev libcfitsio-dev zlib1g-dev libcurl4-openssl-dev libssl-dev libbrotli-dev libaec-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install pkg-config hdf5 curl zlib libaec
        brew install --cask xquartz

    - name: Build static cfitsio
      run: |
        curl -O https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfitsio-4.6.3.tar.gz
        tar xzf cfitsio-4.6.3.tar.gz
        cd cfitsio-4.6.3
        ./configure --prefix=$HOME/local
        make -j 4
        make install
        cd ..

    - name: get a copy of giza
      run: git clone https://github.com/danieljprice/giza

    - name: Set prefix (macOS)
      if: runner.os == 'macOS'
      run: echo "PREFIX=$(brew --prefix)" >> "$GITHUB_ENV"

    - name: compile splash binary
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
           make -j 4 SYSTEM=gfortran CC=${{ env.CC }} withgiza HDF5=yes FITS=yes \
           HDF5ROOT=$(brew --prefix hdf5) \
           HDF5LIBS="$(brew --prefix hdf5)/lib/libhdf5.a $(brew --prefix libaec)/lib/libsz.a $(brew --prefix libaec)/lib/libaec.a -lz -lm" \
           FITSLIBS="$HOME/local/lib/libcfitsio.a -lz -lcurl -lm" \
           FITS_DIR="$HOME/local" \
           PGPLOTLIBS="../giza/lib/libgiza.a $(pkg-config --libs cairo fontconfig freetype2 x11)" \
           PIELDFLAGS="-pie -static-libgfortran -static-libgcc -static-libquadmath"
           otool -L bin/splash
        else
           make -j 4 SYSTEM=gfortran CC=${{ env.CC }} withgiza HDF5=yes FITS=yes \
           HDF5ROOT='/usr/' FITS_DIR="$HOME/local" \
           HDF5INCLUDE="-I/usr/include/hdf5/serial" HDF5LIBS="-lhdf5"\
           FITSLIBS="$HOME/local/lib/libcfitsio.a -lz -lcurl -lm" \
           PGPLOTLIBS="../giza/lib/libgiza.a $(pkg-config --libs cairo fontconfig freetype2 x11)" \
           PIELDFLAGS="-pie -static"
           ldd bin/splash
        fi
#           HDF5LIBS="/usr/lib/x86_64-linux-gnu/hdf5/serial/libhdf5.a /usr/lib/x86_64-linux-gnu/libsz.a /usr/lib/x86_64-linux-gnu/libaec.a -ldl -lm -lpthread" \
#           HDF5INCLUDE="-I/usr/include/hdf5/serial" \
#           FITSLIBS="$HOME/local/lib/libcfitsio.a -lz /usr/lib/x86_64-linux-gnu/libcurl.a /usr/lib/x86_64-linux-gnu/libbrotlidec.a" \

    - name: Download linuxdeploy
      if: runner.os == 'Linux'
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage

    - name: Create AppImage (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

        # Copy splash binary
        cp bin/splash AppDir/usr/bin/

        # Create a basic desktop file required by AppImage
        cat << 'EOF' > AppDir/usr/share/applications/splash.desktop
        [Desktop Entry]
        Name=Splash
        Exec=splash
        Icon=splash
        Type=Application
        Categories=Science;
        Terminal=true
        EOF

        # Create a dummy icon
        touch AppDir/usr/share/icons/hicolor/256x256/apps/splash.png

        # Run linuxdeploy to bundle libraries (LDAI_OUTPUT fixes the AppImage name; default is Name+arch from .desktop)
        export LDAI_OUTPUT="splash-${{ matrix.suffix }}.AppImage"
        ./linuxdeploy-x86_64.AppImage --appdir AppDir -e AppDir/usr/bin/splash --output appimage
        ls -la *.AppImage

        # Put the AppImage in a tarball so it can extract as 'splash'
        mkdir -p standalone
        mv "splash-${{ matrix.suffix }}.AppImage" standalone/splash
        tar czf splash-${{ matrix.suffix }}-standalone.tar.gz -C standalone splash
        cd ..

    - name: Package standalone binary
      run: |
        tar czf splash-${{ matrix.suffix }}.tar.gz -C bin splash

    - name: Upload binary artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: splash-binary-${{ matrix.suffix }}
        path: |
          splash-${{ matrix.suffix }}.tar.gz
          splash-${{ matrix.suffix }}-standalone.tar.gz

    - name: Upload binary artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: splash-binary-${{ matrix.suffix }}
        path: splash-${{ matrix.suffix }}.tar.gz

  binaries:
    needs: build-binaries
    runs-on: ubuntu-latest
    outputs:
      binary_files: ${{ steps.collect.outputs.binary_files }}
    steps:
    - name: Download all binary artifacts
      uses: actions/download-artifact@v4
      with:
        path: binary-artifacts
        pattern: splash-binary-*
        merge-multiple: true

    - name: Collect paths for release upload
      id: collect
      run: |
        cd "$GITHUB_WORKSPACE"
        {
          echo 'binary_files<<__BINLIST__'
          find binary-artifacts -maxdepth 1 -type f -name '*.tar.gz' | sort
          echo '__BINLIST__'
        } >> "$GITHUB_OUTPUT"

  release:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
    - name: checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Get version
      id: get_version
      env:
        vernum: ${{ github.ref }}
        repo: ${{ github.repository }}
      run: |
        echo "version=${vernum/refs\/tags\//}" >> $GITHUB_ENV
        echo "repo=$(basename ${repo})" >> $GITHUB_ENV
        echo "tarfile=$(basename ${repo})-${vernum/refs\/tags\//}.tar.gz" >> $GITHUB_ENV

    - name: build tarball
      env:
          tarfile: ${{ env.tarfile }}
          repo: ${{ env.repo }}
      run: |
          echo "tarfile=${{ env.tarfile }}, repo=${{ env.repo }}"
          tar cfz /tmp/${{ env.tarfile }} --exclude ".git*" \
              --transform "s,.,${{ env.repo }}," .

    - name: check tarball and get SHA
      env:
          tarfile: ${{ env.tarfile }}
      id: shasum
      run: |
          mv /tmp/${{ env.tarfile }} .
          tar tfz ${{ env.tarfile }}
          echo "sha=$(shasum -a 256 ${{ env.tarfile }} | awk '{printf $1}')" >> $GITHUB_ENV

    - name: Extract Release Notes
      run: |
          ./scripts/get_release_notes.pl > release-notes.md

    - name: Download binary artifacts for release
      uses: actions/download-artifact@v4
      with:
        path: binary-artifacts
        pattern: splash-binary-*
        merge-multiple: true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: release-notes.md
        files: |
          ${{ env.tarfile }}
          ${{ needs.binaries.outputs.binary_files }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Homebrew
      id: set-up-homebrew
      uses: Homebrew/actions/setup-homebrew@master

    - name: Bump Brew
      env:
        HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.BREW_TOKEN_SPLASH }}
        version: ${{ env.version }}
        brewtap: danieljprice/all
        formula: ${{ env.repo }}
      run: |
        git config --global user.email "daniel.price@monash.edu"
        git config --global user.name "Daniel Price"
        brew install pipgrip
        brew tap $brewtap
        brew bump-formula-pr -f --version=${version/v/} --no-browse --no-audit \
        --sha256=${{ env.sha }} \
        --url="https://github.com/${{ github.repository }}/releases/download/${{ env.version }}/${{ env.tarfile }}" \
        $brewtap/$formula
